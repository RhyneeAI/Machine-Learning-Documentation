<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Linear Regression Calculator</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0d0f14;
      --surface: #13161e;
      --surface2: #1a1e28;
      --border: #252a38;
      --accent: #a78bfa;
      --accent2: #fb923c;
      --accent3: #34d399;
      --warn: #fbbf24;
      --danger: #f87171;
      --info: #38bdf8;
      --text: #e2e8f0;
      --muted: #64748b;
      --mono: 'JetBrains Mono', monospace;
      --sans: 'Sora', sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--surface); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 32px 32px;
      opacity: 0.22;
      pointer-events: none;
      z-index: 0;
    }
    .container { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem; }

    /* Back nav */
    .back-nav { margin-bottom: 2rem; }
    .back-btn { font-family: var(--mono); font-size: 0.75rem; color: var(--muted); text-decoration: none; display: inline-flex; align-items: center; gap: 0.4rem; padding: 0.4rem 0.8rem; border: 1px solid var(--border); border-radius: 6px; transition: all 0.15s; }
    .back-btn:hover { color: var(--accent); border-color: var(--accent); }

    .header { text-align: center; margin-bottom: 3rem; }
    .header h1 { font-family: var(--mono); font-size: 2rem; font-weight: 700; letter-spacing: -0.02em; }
    .header h1 .hl { color: var(--accent); }
    .header p { color: var(--muted); font-size: 0.875rem; margin-top: 0.5rem; }

    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; }
    .card-title { font-family: var(--mono); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 1rem; }

    .config-row { display: flex; gap: 1rem; flex-wrap: wrap; align-items: flex-end; }
    .field { display: flex; flex-direction: column; gap: 0.4rem; }
    .field label { font-size: 0.72rem; color: var(--muted); font-family: var(--mono); }
    .field input { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: var(--mono); font-size: 0.875rem; padding: 0.5rem 0.75rem; outline: none; transition: border-color 0.2s; width: 120px; }
    .field input:focus { border-color: var(--accent); }

    .btn { padding: 0.5rem 1.25rem; border-radius: 6px; font-family: var(--mono); font-size: 0.8rem; font-weight: 600; cursor: pointer; border: none; transition: all 0.15s; }
    .btn-accent { background: var(--accent); color: #0d0f14; }
    .btn-accent:hover { filter: brightness(1.1); }
    .btn-primary { background: var(--accent2); color: #0d0f14; }
    .btn-primary:hover { filter: brightness(1.1); }

    .tbl-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-family: var(--mono); font-size: 0.8rem; }
    th { background: var(--surface2); color: var(--muted); font-size: 0.67rem; text-transform: uppercase; letter-spacing: 0.08em; padding: 0.55rem 0.75rem; text-align: left; border-bottom: 1px solid var(--border); white-space: nowrap; }
    td { padding: 0.45rem 0.75rem; border-bottom: 1px solid var(--border); vertical-align: middle; font-family: var(--mono); font-size: 0.8rem; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,0.012); }
    td input { background: transparent; border: none; border-bottom: 1px solid var(--border); color: var(--text); font-family: var(--mono); font-size: 0.8rem; width: 100%; outline: none; padding: 2px 4px; min-width: 70px; }
    td input:focus { border-color: var(--accent); }
    tfoot td { border-top: 1px solid var(--border); color: var(--warn); font-weight: 700; }

    .col-label-inp { background: transparent; border: none; border-bottom: 1px solid var(--border); color: var(--accent); font-family: var(--mono); font-size: 0.75rem; width: 100px; outline: none; }

    /* Result blocks */
    .section-title { font-family: var(--mono); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.12em; color: var(--muted); margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem; }
    .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    .fbox { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 0.75rem 1rem; font-family: var(--mono); font-size: 0.8rem; line-height: 2; }
    .kw { color: var(--info); }
    .val { color: var(--accent); font-weight: 600; }
    .res { color: var(--warn); font-weight: 700; }
    .eq { color: var(--accent3); font-weight: 700; }

    .step { margin-bottom: 1.5rem; }
    .step-label { font-family: var(--mono); font-size: 0.63rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 0.45rem; display: flex; align-items: center; gap: 0.5rem; }
    .step-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    /* Metric cards */
    .metric-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1rem; margin-top: 0.5rem; }
    .metric-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 1rem; text-align: center; }
    .metric-name { font-family: var(--mono); font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 0.4rem; }
    .metric-val { font-family: var(--mono); font-size: 1.6rem; font-weight: 700; }
    .metric-desc { font-size: 0.7rem; color: var(--muted); margin-top: 0.3rem; }
    .m-mse  { border-color: rgba(168,139,250,0.4); }  .m-mse  .metric-val { color: var(--accent); }
    .m-rmse { border-color: rgba(251,146,60,0.4); }   .m-rmse .metric-val { color: var(--accent2); }
    .m-mae  { border-color: rgba(52,211,153,0.4); }   .m-mae  .metric-val { color: var(--accent3); }
    .m-r2   { border-color: rgba(56,189,248,0.4); }   .m-r2   .metric-val { color: var(--info); }

    /* R2 bar */
    .r2-bar-wrap { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 1rem; margin-top: 0.75rem; }
    .r2-bar-track { background: var(--border); border-radius: 4px; height: 10px; overflow: hidden; margin: 0.5rem 0; }
    .r2-bar-fill { height: 100%; border-radius: 4px; background: linear-gradient(90deg, var(--danger), var(--warn), var(--accent3)); transition: width 0.8s cubic-bezier(.22,.68,0,1.2); }
    .r2-label { font-family: var(--mono); font-size: 0.72rem; color: var(--muted); }

    /* Equation display */
    .eq-box { background: var(--surface2); border: 1px solid rgba(168,139,250,0.3); border-radius: 8px; padding: 1rem 1.25rem; font-family: var(--mono); font-size: 1rem; font-weight: 700; color: var(--accent3); text-align: center; letter-spacing: 0.02em; }

    .divider { height: 1px; background: var(--border); margin: 1.25rem 0; }
    .hidden { display: none !important; }
    .fade-in { animation: fi 0.35s ease; }
    @keyframes fi { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

    .tag { font-family: var(--mono); font-size: 0.65rem; padding: 0.2rem 0.55rem; border-radius: 4px; font-weight: 600; }
    .tag-pos { background: rgba(52,211,153,0.15); color: var(--accent3); }
    .tag-neg { background: rgba(248,113,113,0.15); color: var(--danger); }

    .hint { font-size: 0.72rem; color: var(--muted); font-family: var(--mono); margin-top: 0.5rem; }

    /* Interpretation box */
    .interp { border-radius: 8px; padding: 0.8rem 1rem; font-family: var(--mono); font-size: 0.8rem; line-height: 1.8; }
    .interp-good { background: rgba(52,211,153,0.08); border: 1px solid rgba(52,211,153,0.3); color: var(--accent3); }
    .interp-mid  { background: rgba(251,191,36,0.08); border: 1px solid rgba(251,191,36,0.3); color: var(--warn); }
    .interp-bad  { background: rgba(248,113,113,0.08); border: 1px solid rgba(248,113,113,0.3); color: var(--danger); }
  </style>
</head>
<body>
<div class="container">

  <!-- Back -->
  <div class="back-nav">
    <a href="index.html" class="back-btn">← Kembali ke Menu</a>
  </div>

  <div class="header">
    <h1><span class="hl">Linear</span> Regression</h1>
    <p>Hitung slope, intercept, residual, dan evaluasi model — step by step</p>
  </div>

  <!-- Step 1: Config -->
  <div class="card">
    <div class="card-title">01 — Konfigurasi Data</div>
    <div class="config-row">
      <div class="field">
        <label>Jumlah Data (baris)</label>
        <input type="number" id="numRows" value="12" min="3" max="100"/>
      </div>
      <div style="margin-top:auto;">
        <button class="btn btn-accent" id="btnGen">Generate Tabel</button>
      </div>
    </div>
    <p class="hint" style="margin-top:0.75rem;">💡 Isi nama kolom X dan Y di header · Kosongkan / tulis null untuk missing value (diimputasi median)</p>
  </div>

  <!-- Step 2: Table -->
  <div class="card hidden" id="tblCard">
    <div class="card-title">02 — Input Data (X = Variabel Bebas, Y = Variabel Target)</div>
    <div class="tbl-wrap"><table id="dataTable"></table></div>
    <div style="margin-top:1.25rem;">
      <button class="btn btn-primary" id="btnCalc">Hitung Regresi →</button>
    </div>
  </div>

  <!-- Results -->
  <div id="resultSec" class="hidden"></div>

</div>

<script>
$(function () {
  let nR = 12;

  // ── Generate ─────────────────────────────────────────────
  $('#btnGen').on('click', function () {
    nR = Math.max(3, parseInt($('#numRows').val()) || 12);

    let h = `<thead><tr>
      <th style="width:42px;">#</th>
      <th><input class="col-label-inp" id="xLabel" value="X" /></th>
      <th><input class="col-label-inp" id="yLabel" value="Y" /></th>
    </tr></thead><tbody>`;

    for (let r = 0; r < nR; r++) {
      h += `<tr>
        <td style="color:var(--muted);text-align:center;">${r+1}</td>
        <td><input type="text" class="xval" data-r="${r}" placeholder="null"/></td>
        <td><input type="text" class="yval" data-r="${r}" placeholder="null"/></td>
      </tr>`;
    }
    h += '</tbody>';
    $('#dataTable').html(h);
    $('#tblCard').removeClass('hidden').addClass('fade-in');
    $('#resultSec').addClass('hidden').html('');
  });

  // ── Calculate ──────────────────────────────────────────
  $('#btnCalc').on('click', function () {
    const xLabel = $('#xLabel').val() || 'X';
    const yLabel = $('#yLabel').val() || 'Y';

    const rawX = [], rawY = [];
    for (let r = 0; r < nR; r++) {
      const xv = $('.xval[data-r="'+r+'"]').val().trim();
      const yv = $('.yval[data-r="'+r+'"]').val().trim();
      rawX.push(parseToNum(xv));
      rawY.push(parseToNum(yv));
    }

    // Impute with median
    const medX = median(rawX.filter(v => v !== null));
    const medY = median(rawY.filter(v => v !== null));
    const xs = rawX.map((v,i) => ({ val: v===null?medX:v, imp: v===null, row: i+1 }));
    const ys = rawY.map((v,i) => ({ val: v===null?medY:v, imp: v===null, row: i+1 }));
    const xv = xs.map(d=>d.val), yv = ys.map(d=>d.val);
    const n = xv.length;

    // Sums
    const sumX  = xv.reduce((a,b)=>a+b,0);
    const sumY  = yv.reduce((a,b)=>a+b,0);
    const sumXY = xv.reduce((s,x,i)=>s+x*yv[i],0);
    const sumX2 = xv.reduce((s,x)=>s+x*x,0);
    const xBar  = sumX/n, yBar = sumY/n;

    // Slope & intercept
    const slopeNum = n*sumXY - sumX*sumY;
    const slopeDen = n*sumX2 - sumX*sumX;
    const b = slopeNum/slopeDen;
    const a = yBar - b*xBar;

    // Predictions & residuals
    const yHat = xv.map(x => a + b*x);
    const resid = yv.map((y,i) => y - yHat[i]);

    // Metrics
    const sumRes2 = resid.reduce((s,r)=>s+r*r,0);
    const mse  = sumRes2/n;
    const rmse = Math.sqrt(mse);
    const mae  = resid.reduce((s,r)=>s+Math.abs(r),0)/n;
    const ssTot = yv.reduce((s,y)=>s+Math.pow(y-yBar,2),0);
    const r2   = 1 - sumRes2/ssTot;
    const absRes = resid.map(r=>Math.abs(r));

    // ── Render ──
    let html = '<div class="fade-in">';

    // Imputation notice
    const hasImpX = xs.some(d=>d.imp), hasImpY = ys.some(d=>d.imp);
    if (hasImpX || hasImpY) {
      html += `<div style="background:rgba(251,191,36,0.08);border:1px solid rgba(251,191,36,0.25);border-radius:8px;padding:0.65rem 1rem;font-family:var(--mono);font-size:0.75rem;color:var(--warn);margin-bottom:1.25rem;">
        ⚠ Missing value diimputasi: ${hasImpX?`median ${xLabel} = ${f(medX)}  `:''} ${hasImpY?`median ${yLabel} = ${f(medY)}`:''}
      </div>`;
    }

    // ── A: Tabel Bantu ──
    html += `<div class="card">
      <div class="section-title">A — Tabel Bantu Perhitungan</div>`;

    let tblRows = xv.map((x,i) => {
      const xy = x*yv[i], x2 = x*x;
      return `<tr>
        <td>${i+1}</td>
        <td class="${xs[i].imp?'':''}">` + (xs[i].imp?`<span style="color:var(--warn);">${f(x)}</span>`:f(x)) + `</td>
        <td>` + (ys[i].imp?`<span style="color:var(--warn);">${f(yv[i])}</span>`:f(yv[i])) + `</td>
        <td style="color:var(--accent2);">${f(xy)}</td>
        <td style="color:var(--accent);">${f(x2)}</td>
      </tr>`;
    }).join('');

    html += `<div class="tbl-wrap">
      <table>
        <thead><tr><th>#</th><th>${xLabel}</th><th>${yLabel}</th><th>${xLabel}×${yLabel}</th><th>${xLabel}²</th></tr></thead>
        <tbody>${tblRows}</tbody>
        <tfoot>
          <tr>
            <td>Σ</td>
            <td>${f(sumX)}</td>
            <td>${f(sumY)}</td>
            <td style="color:var(--accent2);">${f(sumXY)}</td>
            <td style="color:var(--accent);">${f(sumX2)}</td>
          </tr>
        </tfoot>
      </table>
    </div></div>`;

    // ── B: Slope & Intercept ──
    html += `<div class="card">
      <div class="section-title">B — Hitung Slope (b) dan Intercept (a)</div>

      <div class="step">
        <div class="step-label">Rumus Slope (b)</div>
        <div class="fbox">
          <span class="kw">b</span> = [n×Σ(XY) − Σ(X)×Σ(Y)] / [n×Σ(X²) − (Σ(X))²]<br/>
          <span class="kw">b</span> = [${n}×${f(sumXY)} − ${f(sumX)}×${f(sumY)}] / [${n}×${f(sumX2)} − ${f(sumX)}²]<br/>
          <span class="kw">b</span> = [${f(n*sumXY)} − ${f(sumX*sumY)}] / [${f(n*sumX2)} − ${f(sumX*sumX)}]<br/>
          <span class="kw">b</span> = ${f(slopeNum)} / ${f(slopeDen)} = <span class="res">${f(b)}</span>
        </div>
      </div>

      <div class="step">
        <div class="step-label">Rumus Intercept (a)</div>
        <div class="fbox">
          <span class="kw">X̄</span> = ${f(sumX)} / ${n} = <span class="val">${f(xBar)}</span> &nbsp;&nbsp;
          <span class="kw">Ȳ</span> = ${f(sumY)} / ${n} = <span class="val">${f(yBar)}</span><br/>
          <span class="kw">a</span> = Ȳ − b×X̄ = ${f(yBar)} − ${f(b)}×${f(xBar)} = ${f(yBar)} − ${f(b*xBar)} = <span class="res">${f(a)}</span>
        </div>
      </div>

      <div class="step">
        <div class="step-label">Persamaan Regresi Akhir</div>
        <div class="eq-box">Ŷ = ${f(a)} + ${f(b)} ${xLabel}</div>
      </div>
    </div>`;

    // ── C: Residual ──
    let residRows = xv.map((x,i) => {
      const sign = resid[i] >= 0;
      return `<tr>
        <td>${i+1}</td>
        <td>${f(x)}</td>
        <td>${f(yv[i])}</td>
        <td style="color:var(--info);">${f(a)} + ${f(b)}×${f(x)} = ${f(yHat[i])}</td>
        <td class="${sign?'':''}"><span style="color:${sign?'var(--accent3)':'var(--danger)'};">${f(resid[i])}</span></td>
        <td style="color:var(--accent2);">${f(resid[i]*resid[i])}</td>
        <td style="color:var(--accent);">${f(Math.abs(resid[i]))}</td>
      </tr>`;
    }).join('');

    html += `<div class="card">
      <div class="section-title">C — Nilai Prediksi Ŷ dan Residual</div>
      <div class="tbl-wrap">
        <table>
          <thead><tr><th>#</th><th>${xLabel}</th><th>${yLabel}</th><th>Ŷ (Perhitungan)</th><th>Residual (Y−Ŷ)</th><th>Residual²</th><th>|Residual|</th></tr></thead>
          <tbody>${residRows}</tbody>
          <tfoot>
            <tr>
              <td colspan="5">Σ</td>
              <td>${f(sumRes2)}</td>
              <td>${f(absRes.reduce((a,b)=>a+b,0))}</td>
            </tr>
          </tfoot>
        </table>
      </div>
    </div>`;

    // ── D: Evaluasi ──
    // SS_tot rows
    const ssTotRows = yv.map((y,i) => {
      const diff = y - yBar, sq = diff*diff;
      return `<tr>
        <td>${i+1}</td>
        <td>${f(y)}</td>
        <td>${f(diff)}</td>
        <td style="color:var(--accent);">${f(sq)}</td>
      </tr>`;
    }).join('');

    const r2interp = r2 >= 0.9 ? `<div class="interp interp-good">✓ R² = ${f(r2)} — Model sangat fit. ${f(r2*100)}% variasi ${yLabel} dapat dijelaskan oleh ${xLabel}.</div>`
      : r2 >= 0.7 ? `<div class="interp interp-mid">~ R² = ${f(r2)} — Model cukup baik. ${f(r2*100)}% variasi ${yLabel} dapat dijelaskan oleh ${xLabel}.</div>`
      : `<div class="interp interp-bad">✗ R² = ${f(r2)} — Model kurang fit. Hanya ${f(r2*100)}% variasi ${yLabel} yang dapat dijelaskan oleh ${xLabel}.</div>`;

    html += `<div class="card">
      <div class="section-title">D — Evaluasi Model</div>

      <div class="step">
        <div class="step-label">MSE — Mean Squared Error</div>
        <div class="fbox">
          MSE = Σ(Y − Ŷ)² / n = ${f(sumRes2)} / ${n} = <span class="res">${f(mse)}</span>
        </div>
      </div>

      <div class="step">
        <div class="step-label">RMSE — Root Mean Squared Error</div>
        <div class="fbox">
          RMSE = √MSE = √${f(mse)} = <span class="res">${f(rmse)}</span>
          <br/><span style="color:var(--muted);font-size:0.72rem;">→ rata-rata error prediksi dalam satuan ${yLabel}</span>
        </div>
      </div>

      <div class="step">
        <div class="step-label">MAE — Mean Absolute Error</div>
        <div class="fbox">
          MAE = Σ|Y − Ŷ| / n = ${f(absRes.reduce((a,b)=>a+b,0))} / ${n} = <span class="res">${f(mae)}</span>
          <br/><span style="color:var(--muted);font-size:0.72rem;">→ rata-rata selisih absolut prediksi vs aktual</span>
        </div>
      </div>

      <div class="step">
        <div class="step-label">R² — Coefficient of Determination</div>
        <div class="tbl-wrap" style="margin-bottom:0.75rem;">
          <table>
            <thead><tr><th>#</th><th>${yLabel}</th><th>(Y − Ȳ)</th><th>(Y − Ȳ)²</th></tr></thead>
            <tbody>${ssTotRows}</tbody>
            <tfoot><tr><td colspan="3">SS_tot = Σ(Y − Ȳ)²</td><td>${f(ssTot)}</td></tr></tfoot>
          </table>
        </div>
        <div class="fbox" style="margin-bottom:0.75rem;">
          SS_res = Σ(Y − Ŷ)² = <span class="val">${f(sumRes2)}</span> &nbsp;&nbsp; SS_tot = Σ(Y − Ȳ)² = <span class="val">${f(ssTot)}</span><br/>
          R² = 1 − (SS_res / SS_tot) = 1 − (${f(sumRes2)} / ${f(ssTot)}) = 1 − ${f(sumRes2/ssTot)} = <span class="res">${f(r2)}</span>
        </div>
        <div class="r2-bar-wrap">
          <div class="r2-label">Goodness of Fit: R² = ${f(r2)} = ${f(r2*100)}%</div>
          <div class="r2-bar-track"><div class="r2-bar-fill" id="r2Fill" style="width:0%"></div></div>
          <div style="display:flex;justify-content:space-between;font-family:var(--mono);font-size:0.65rem;color:var(--muted);">
            <span>0%</span><span style="color:var(--warn);">70%</span><span style="color:var(--accent3);">90%</span><span>100%</span>
          </div>
        </div>
        <div style="margin-top:0.75rem;">${r2interp}</div>
      </div>

      <!-- Summary Cards -->
      <div class="divider"></div>
      <div class="section-title">Ringkasan Evaluasi</div>
      <div class="metric-grid">
        <div class="metric-card m-mse">
          <div class="metric-name">MSE</div>
          <div class="metric-val">${f(mse)}</div>
          <div class="metric-desc">Mean Squared Error</div>
        </div>
        <div class="metric-card m-rmse">
          <div class="metric-name">RMSE</div>
          <div class="metric-val">${f(rmse)}</div>
          <div class="metric-desc">Root MSE · satuan ${yLabel}</div>
        </div>
        <div class="metric-card m-mae">
          <div class="metric-name">MAE</div>
          <div class="metric-val">${f(mae)}</div>
          <div class="metric-desc">Mean Absolute Error</div>
        </div>
        <div class="metric-card m-r2">
          <div class="metric-name">R²</div>
          <div class="metric-val">${f(r2)}</div>
          <div class="metric-desc">${f(r2*100)}% variasi dijelaskan</div>
        </div>
      </div>
    </div>`;

    html += '</div>';
    $('#resultSec').html(html).removeClass('hidden');
    $('html,body').animate({ scrollTop: $('#resultSec').offset().top - 20 }, 400);

    // Animate R2 bar
    setTimeout(() => { $('#r2Fill').css('width', Math.max(0,Math.min(100,r2*100))+'%'); }, 300);
  });

  // ── Helpers ─────────────────────────────────────────────
  function parseToNum(v) {
    if (!v || v.toLowerCase() === 'null' || v === '?') return null;
    const n = parseFloat(v);
    return isNaN(n) ? null : n;
  }
  function median(arr) {
    if (!arr.length) return 0;
    const s = [...arr].sort((a,b)=>a-b), m = Math.floor(s.length/2);
    return s.length%2 ? s[m] : (s[m-1]+s[m])/2;
  }
  function f(v) {
    if (v === null || v === undefined || isNaN(v)) return '?';
    const r = Math.round(v * 10000) / 10000;
    return r.toString();
  }
});
</script>
</body>
</html>
